name: Build and Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

env:
  GO_VERSION: '1.21'

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          git fetch --tags
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST"

      - name: Calculate new version
        id: calc
        run: |
          CURRENT=${{ steps.latest.outputs.tag }}
          CURRENT=${CURRENT#v}  # Remove 'v' prefix

          # Parse version
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          # Bump version
          case "${{ github.event.inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          VERSION="${{ needs.version.outputs.version }}"
          BINARY_NAME="vpsctl-${{ matrix.os }}-${{ matrix.arch }}"

          go build -ldflags="-s -w -X main.Version=${VERSION}" -o dist/${BINARY_NAME} .
          chmod +x dist/${BINARY_NAME}

          cd dist
          sha256sum ${BINARY_NAME} > ${BINARY_NAME}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpsctl-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 7

  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "vpsctl-*" -o -name "*.sha256" \) -exec cp {} release-assets/ \;
          cp scripts/install.sh release-assets/install.sh
          chmod +x release-assets/install.sh
          ls -la release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum vpsctl-* install.sh > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: vpsctl ${{ needs.version.outputs.version }}
          body: |
            ## vpsctl ${{ needs.version.outputs.version }}

            Modern VPS management tool using LXD.

            ### Installation

            ```bash
            # One-line install
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash

            # Or with specific version
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash -s -- -v ${{ needs.version.outputs.version }}
            ```

            ### Manual Download

            | Platform | Architecture | Binary |
            |----------|--------------|--------|
            | Linux | AMD64 | `vpsctl-linux-amd64` |

            ### What's Changed
            See [CHANGELOG.md](CHANGELOG.md) for details.

          files: release-assets/*
          draft: false
          prerelease: false

  # Optional: Auto-deploy to server
  deploy:
    name: Deploy to Server
    needs: [version, build, release]
    runs-on: ubuntu-latest
    if: vars.DEPLOY_ENABLED == 'true'
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vpsctl-linux-amd64
          path: dist

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "dist/vpsctl-linux-amd64"
          target: "/tmp/vpsctl-deploy"

      - name: Install and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            sudo cp /tmp/vpsctl-deploy/dist/vpsctl-linux-amd64 /usr/local/bin/vpsctl
            sudo chmod +x /usr/local/bin/vpsctl
            sudo systemctl restart vpsctl || true
            echo "Deployed vpsctl ${{ needs.version.outputs.version }} successfully"
